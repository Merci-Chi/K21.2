<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #000;
      --panel: rgba(20, 27, 42, 0.84);
      --panel-strong: rgba(25, 33, 50, 0.96);
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: #fff;
      --muted: #a5adbd;
      --blue: #5a8cff;
      --green: #46d29c;
      --orange: #ff9a52;
      --yellow: #ffd33d;
      --pink: #ff74ba;
      --teal: #46d7c5;
      --purple: #9d70ff;
      --red: #ff7276;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      --nav-height: 94px;
      --keyboard-offset: 0px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    html {
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      height: 100%;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: default;
      touch-action: manipulation;
    }

    input,
    textarea,
    [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
    }

    .phone {
      position: relative;
      width: min(100%, 430px);
      height: min(932px, calc(100dvh - 44px));
      max-height: 100dvh;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(180deg, #04060c 0%, #000 42%, #000 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 72%, transparent 100%);
      opacity: 0.22;
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      padding: 52px 22px 120px;
      overscroll-behavior: contain;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    #editorView.page-dark {
      background: transparent;
      color: #fff;
    }

    #editorView.page-light {
      background: #fff;
      color: #111827;
    }

    #editorView.page-light .topbar.center {
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.98),
        rgba(255, 255, 255, 0.86) 72%,
        transparent
      );
    }

    #editorView.page-light .editor-title {
      color: #111827;
    }

    #editorView.page-light .editor-title::placeholder {
      color: rgba(17, 24, 39, 0.38);
    }

    #editorView.page-light .icon-btn:not(.primary) {
      color: rgba(17, 24, 39, 0.82);
      background: rgba(17, 24, 39, 0.055);
      box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.1);
    }

    #editorView.page-light .kicker {
      color: rgba(17, 24, 39, 0.58);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    #editorView .editor-title,
#editorView .blocks,
#editorView .add-line {
  margin-left: 22px;
  margin-right: 22px;
  width: calc(100% - 44px);
}
.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

 .topbar.center {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 12;

  width: 100%;
  margin: 0 0 14px;
  padding: 14px 22px 10px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;

  background: linear-gradient(
    180deg,
    rgba(4, 6, 12, 0.96),
    rgba(4, 6, 12, 0.76) 72%,
    transparent
  );
  backdrop-filter: none;
}
    .title-stack {
      min-width: 0;
      flex: 1;
    }

    .kicker {
      margin: 0 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 44px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 150ms ease, background 150ms ease;
    }

    .icon-btn:active,
    .note-card:active,
    .action-btn:active,
    .toolbar button:active {
      transform: scale(0.96);
    }

    .icon-btn.primary {
  color: #fff;
  background: linear-gradient(140deg, #48a7ff 0%, #7d7aff 48%, #aa62ff 100%);
  box-shadow: 0 14px 30px rgba(90, 140, 255, 0.34);
}

#editorView.page-light .icon-btn.primary {
  color: rgba(17, 24, 39, 0.82);
  background: rgba(17, 24, 39, 0.055);
  box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.1);
}

    .icon-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--blue));
      box-shadow: 0 12px 28px rgba(72, 167, 255, 0.24), inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .icon-btn.danger {
      color: #fff;
      background: color-mix(in srgb, var(--red) 30%, rgba(255, 255, 255, 0.06));
    }

    .search {
      position: relative;
      margin-bottom: 45px;
    }

    .search i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.48);
      font-size: 14px;
    }

    .search input {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      outline: none;
      color: var(--text);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        rgba(12, 17, 28, 0.86);
      padding: 0 14px 0 41px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .search input::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .note-list {
      display: grid;
      gap: 16px;
      padding-top: 25px;
      margin-bottom: 170px;
    }

    .note-card {
      --accent: var(--blue);
      position: relative;
      width: 100%;
      min-width: 0;
      display: grid;
      gap: 12px;
      padding: 16px;
      text-align: left;
      border-radius: 20px;
      color: var(--text);
      background:
        linear-gradient(95deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent 52%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.022)),
        rgba(12, 17, 28, 0.94);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

 .selection-active .note-card.selected {
  border-color: transparent;
  box-shadow: none;
}

.selection-active .note-card.selected::after {
  content: "";
  position: absolute;
  inset: -2px;
  z-index: 3;
  pointer-events: none;
  border-radius: 20px;
  padding: 4px;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.block-group {
  position: relative;
  display: grid;
  gap: 3px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: 20px;
}

.selection-active .block-group.selected {
  border-color: transparent;
  box-shadow: none;
  background: transparent;
}

.selection-active .block-group.selected::after {
  content: "";
  position: absolute;
  inset: -2px;
  z-index: 3;
  pointer-events: none;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
.selection-active .block-group.selected .block {
  border-color: transparent !important;
  box-shadow: none !important;
  background: transparent !important;
}

.selection-active .block-group.selected .block.selected {
  border-color: transparent;
  box-shadow: none;
  background: transparent;
}

.selection-active .block-group.selected .block {
  border-color: transparent;
  box-shadow: none;
}
    .note-card.reveal-delete,
    .block.reveal-delete {
      border-color: color-mix(in srgb, var(--red) 70%, rgba(255, 255, 255, 0.2));
    }

    .note-main {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
      min-width: 0;
    }

    .note-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--accent);
      background:
        radial-gradient(circle at 36% 28%, color-mix(in srgb, var(--accent) 44%, white), transparent 34%),
        rgba(255, 255, 255, 0.065);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 34%, rgba(255, 255, 255, 0.08));
    }

    .note-copy {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .note-title {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .note-preview {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.36;
      overflow-wrap: anywhere;
    }

.note-actions {
  display: none;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
}

.notes-tools-open .note-actions {
  display: none;
}

.selection-bar .note-tool {
  display: none;
}

.note-selection .selection-bar .note-tool {
  display: grid;
}
    .empty-state {
      min-height: 230px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.64);
      font-size: 22px;
      font-weight: 900;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 150ms ease;
    }

    .action-btn.pin.active {
      color: #06101d;
      background: var(--yellow);
    }

    .action-btn.delete,
    .delete-reveal {
      color: #fff;
      background: color-mix(in srgb, var(--red) 30%, rgba(255, 255, 255, 0.06));
    }

    .dragging {
      opacity: 0.58;
      transform: scale(0.985);
    }

    .editor-title {
      width: 100%;
      min-height: 44px;
      margin: 0 0 12px;
      border: 0;
      outline: none;
      color: #fff;
      background: transparent;
      font-size: 34px;
      font-weight: 920;
      line-height: 1.07;
      letter-spacing: 0;
      resize: none;
      overflow: hidden;
    }

    .editor-title::placeholder {
      color: rgba(255, 255, 255, 0.34);
    }

    .blocks {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding-bottom: 500px;
    }

    .note-page {
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: #141414;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 22px;
      padding: 16px 14px;
      color: #fff;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .note-page + .note-page {
      margin-top: 14px;
    }

    .note-page.light {
      background: #fff;
      border-color: #e1e4e8;
      color: #111827;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .note-page .block:focus-within {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(255, 255, 255, 0.09);
    }

    .note-page.light .block:focus-within {
      background: rgba(15, 23, 42, 0.035);
      border-color: rgba(15, 23, 42, 0.08);
    }

    .note-page.light .editable,
    .note-page.light .dropdown-child-editable,
    .note-page.light .marker,
    .note-page.light .dropdown-caret,
    .note-page.light .dropdown-child-marker {
      color: #111827;
    }

    .note-page.light .editable:empty::before,
    .note-page.light .dropdown-child-editable:empty::before {
      color: rgba(17, 24, 39, 0.38);
    }

    .block {
      --accent: var(--blue);
      position: relative;
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .block:focus-within {
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.07);
    }

.selection-active .note-page .block.selected {
  border-color: transparent;
  box-shadow: none;
}

.selection-active .note-page .block.selected::after,
.selection-active .block-group .block.selected::after {
  content: "";
  position: absolute;
  inset: -2px;
  z-index: 3;
  pointer-events: none;
  border-radius: 18px;
  padding: 2px;
  background: linear-gradient(135deg, var(--blue), var(--pink));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.selection-active .block-group.selected .block.selected {
  background: transparent;
}

.selection-active .block-group.selected .block.selected {
  background: transparent;
}
    .selection-active [contenteditable="true"] {
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
  caret-color: transparent;
}

    .block.drop-before::before,
    .block.drop-after::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    .block.drop-before::before {
      top: -3px;
    }

    .block.drop-after::after {
      bottom: -3px;
    }

  .block.grouped {
  border-color: transparent;
  background: transparent;
}

    .block-line {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
    }

    .editable {
      min-width: 0;
      min-height: 27px;
      outline: none;
      color: #fff;
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .editable:empty::before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.34);
    }

    .editable mark,
    .dropdown-child-editable mark {
      color: #06101d;
      background: linear-gradient(135deg, rgba(255, 211, 61, 0.94), rgba(255, 116, 186, 0.82));
      border-radius: 5px;
      padding: 0 2px;
    }

    .heading .editable {
      font-size: 24px;
      font-weight: 920;
      line-height: 1.12;
    }

    .size-title .editable {
      font-size: 31px;
      font-weight: 940;
      line-height: 1.08;
    }

    .size-title .marker,
    .size-title .task-check,
    .size-title .dropdown-caret {
      font-size: 31px;
    }

    .size-heading .editable {
      font-size: 24px;
      font-weight: 920;
      line-height: 1.12;
    }

    .size-heading .marker,
    .size-heading .task-check,
    .size-heading .dropdown-caret {
      font-size: 24px;
    }

    .size-subtitle .editable {
      font-size: 20px;
      font-weight: 820;
      line-height: 1.22;
      color: #fff;
    }

    .size-subtitle .marker,
    .size-subtitle .task-check,
    .size-subtitle .dropdown-caret {
      font-size: 20px;
    }

    .size-text .editable {
      font-size: 16px;
      font-weight: 500;
    }

    .size-text .marker,
    .size-text .task-check,
    .size-text .dropdown-caret {
      font-size: 16px;
    }

    .size-subtext .editable {
      font-size: 13px;
      line-height: 1.38;
      color: #fff;
    }

    .size-subtext .marker,
    .size-subtext .task-check,
    .size-subtext .dropdown-caret {
      font-size: 13px;
    }

    .quote .editable {
      padding-left: 13px;
      border-left: 3px solid var(--accent);
      color: #fff;
      font-style: italic;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card-grid .block {
      min-width: 0;
    }

    .card {
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.2);
      padding: 0;
      overflow: visible;
    }

    .note-page.light .card {
      background: #fff;
      border-color: #e1e4e8;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .card .block-line {
      display: block;
    }

    .card .editable {
      min-height: 72px;
      padding: 16px;
      border-radius: inherit;
      color: #fff;
      background: transparent;
      box-shadow: none;
    }

    .note-page.light .card .editable {
      color: #111827;
    }

    .bullet .block-line,
    .number .block-line,
    .task .block-line,
    .dropdown .block-line {
      grid-template-columns: auto 1fr;
      align-items: start;
    }

    .marker {
      min-width: 24px;
      height: 27px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 850;
      font-size: 1em;
      line-height: 1;
    }

    .task-check {
      width: 1.35em;
      height: 1.35em;
      min-width: 1.35em;
      margin-top: 1px;
      display: grid;
      place-items: center;
      border-radius: 0.42em;
      color: #06101d;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.2);
      font-size: 1em;
    }

    .task-check.checked {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--blue));
      box-shadow: 0 0 18px rgba(255, 116, 186, 0.22), 0 0 18px rgba(72, 167, 255, 0.18);
    }

    .task.done .editable {
      color: #fff;
      text-decoration: line-through;
    }

    .dropdown-caret {
      min-width: 24px;
      height: 27px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 1em;
    }

    .dropdown-caret i {
      transform: rotate(-90deg);
      transition: transform 150ms ease;
    }

    .dropdown:not(.collapsed) > .block-line .dropdown-caret i,
    .dropdown-child-row.child-dropdown:not(.collapsed) > .dropdown-child-marker .dropdown-caret i {
      transform: rotate(0deg);
    }

    .dropdown-children {
      display: grid;
      gap: 6px;
      margin: 7px 0 0 32px;
      padding-left: 12px;
      border-left: 1px solid rgba(255, 255, 255, 0.16);
    }

    .dropdown.collapsed .dropdown-children {
      display: none;
    }

    .dropdown-child-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 7px;
      min-width: 0;
    }

    .dropdown-child-row > .dropdown-children {
      grid-column: 2 / -1;
      margin: 0;
    }

    .dropdown-child-row.collapsed > .dropdown-children {
      display: none;
    }

    .dropdown-child-marker {
      min-width: 18px;
      height: 22px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.82);
      font-size: inherit;
      font-weight: 850;
    }

    .toolbar .enter-child-tool {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--blue));
      box-shadow: 0 12px 28px rgba(90, 140, 255, 0.28), inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .alignment-tool {
      margin-left: auto;

        const moving = list.filter(item => movingIds.has(item.id));
        let targetIndex = list.findIndex(item => item.id === targetId);
        if (targetIndex < 0 || movingIds.has(targetId)) return;
        const remaining = list.filter(item => !movingIds.has(item.id));
        targetIndex = remaining.findIndex(item => item.id === targetId);
        remaining.splice(targetIndex + (after ? 1 : 0), 0, ...moving);
        activeNote().blocks = remaining;

        renderAll();
        return;

      const sourceIndex = list.findIndex(item => item.id === sourceId);
      const targetIndex = list.findIndex(item => item.id === targetId);

      if (kind === "note" && list[sourceIndex].pinned !== list[targetIndex].pinned) return;

    function activeEditableSelection() {

        ? range.commonAncestorContainer.closest?.("[contenteditable='true']")
        : range.commonAncestorContainer.parentElement?.closest?.("[contenteditable='true']");

      if (!editable || !editable.contains(range.commonAncestorContainer)) return null;
      return { editable, range };

    function rememberTextSelection() {

      focusedChild = active.editable.dataset.parentId

    function wrapSavedSelection(wrapper) {
      const editable = restoreTextSelection();
      const selected = window.getSelection();
      if (!editable || !selected?.rangeCount || selected.isCollapsed) return null;

      const range = selected.getRangeAt(0);
      if (!editable.contains(range.commonAncestorContainer)) return null;

      const content = range.extractContents();
      wrapper.appendChild(content);
      range.insertNode(wrapper);
      selected.removeAllRanges();
      const after = document.createRange();
      after.selectNodeContents(wrapper);
      after.collapse(false);
      selected.addRange(after);
      updateBlockField(editable);
      return editable;
    }

    function clearSavedHighlight() {
      const editable = restoreTextSelection();
      const selected = window.getSelection();
      if (!editable || !selected?.rangeCount || selected.isCollapsed) return null;

      const range = selected.getRangeAt(0);
      if (!editable.contains(range.commonAncestorContainer)) return null;

      const content = range.extractContents();
      const clean = document.createDocumentFragment();

      function appendClean(node, target) {
        if (node.nodeType === Node.TEXT_NODE) {
          target.appendChild(node.cloneNode(true));
          return;
        }

        if (node.nodeType !== Node.ELEMENT_NODE) return;

        const isHighlight = node.tagName === "MARK"
          || node.classList.contains("text-highlight")
          || node.classList.contains("text-highlight-gradient");

        if (isHighlight) {
          [...node.childNodes].forEach(child => appendClean(child, target));
          return;
        }

        const clone = node.cloneNode(false);
        [...node.childNodes].forEach(child => appendClean(child, clone));
        target.appendChild(clone);
      }

      [...content.childNodes].forEach(node => appendClean(node, clean));
      range.insertNode(clean);
      updateBlockField(editable);
      return editable;
    }

function fileToImageDataUrl(file) {
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = () => {
      const img = new Image();

      img.onload = () => {
        const maxSize = 1200;
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));

        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        resolve(canvas.toDataURL("image/jpeg", 0.78));
      };

      img.onerror = () => resolve(reader.result);
      img.src = reader.result;
    };

    reader.readAsDataURL(file);
  });
