<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      background: #f5efe3;
      color: #2d251d;
      font-family: "Comic Sans MS", "Bradley Hand", cursive;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      max-height: 920px;
      background: #fff9ed;
      border: 2px solid #2d251d;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
      overflow: hidden;
      position: relative;
    }

    .screen {
      height: 100%;
      overflow-y: auto;
      padding: 23px 19px 95px;
    }

    .hide {
      display: none;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 21px;
    }

    h1 {
      margin: 0;
      font-size: 41px;
      line-height: 1;
    }

    .small-btn {
      width: 43px;
      height: 43px;
      border: 2px solid #2d251d;
      border-radius: 11px;
      background: #fff1c6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 18px;
      border: 2px solid #2d251d;
      border-radius: 11px;
      background: transparent;
      outline: none;
    }

    .notes {
      display: grid;
      gap: 13px;
    }

    .note-card {
      width: 100%;
      padding: 14px 15px;
      border: 2px solid #2d251d;
      border-radius: 15px;
      background: #fffdf7;
      text-align: left;
    }

    .note-card strong {
      display: block;
      font-size: 21px;
      margin-bottom: 4px;
    }

    .note-card span {
      font-size: 14px;
      opacity: .7;
    }

    .empty {
      padding: 30px;
      border: 2px dashed #2d251d;
      border-radius: 15px;
      text-align: center;
      opacity: .6;
    }

    .editor-top {
      position: sticky;
      top: -23px;
      z-index: 2;
      margin: -23px -19px 19px;
      padding: 15px 19px;
      background: #fff9ed;
      border-bottom: 2px solid #2d251d;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .editor-top p {
      margin: 0;
      font-size: 14px;
      opacity: .7;
    }

    .title {
      width: 100%;
      min-height: 48px;
      margin-bottom: 15px;
      padding: 9px 12px;
      resize: none;
      border: 2px solid #2d251d;
      border-radius: 11px;
      background: transparent;
      outline: none;
      font-size: 31px;
      font-weight: bold;
    }

    .blocks {
      padding: 12px;
      border: 2px solid #2d251d;
      border-radius: 17px;
      background: #fffdf7;
    }

    .block {
      display: flex;
      gap: 9px;
      padding: 7px;
      border-radius: 9px;
    }

    .marker {
      min-width: 22px;
      padding-top: 3px;
      font-weight: bold;
    }

    .check {
      width: 20px;
      height: 20px;
      margin-top: 3px;
      border: 2px solid #2d251d;
      border-radius: 5px;
      background: transparent;
      flex-shrink: 0;
    }

    .text {
      flex: 1;
      min-height: 32px;
      outline: none;
      line-height: 1.5;
      word-break: break-word;
    }

    .text.big {
      font-size: 25px;
      font-weight: bold;
      text-decoration: underline wavy;
    }

    [contenteditable]:empty::before {
      content: attr(data-placeholder);
      opacity: .4;
    }

    .toolbar {
      position: absolute;
      left: 15px;
      right: 15px;
      bottom: 15px;
      z-index: 5;
      padding: 8px;
      border: 2px solid #2d251d;
      border-radius: 17px;
      background: #fff9ed;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .tool {
      min-width: 40px;
      height: 40px;
      border: 2px solid #2d251d;
      border-radius: 11px;
      background: #fff1c6;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 520px) {
      .app {
        border-radius: 27px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="home" class="screen">
      <div class="top">
        <h1>Notes</h1>
        <button id="addNote" class="small-btn" type="button" aria-label="New note">✎</button>
      </div>

      <input id="search" class="search" type="search" placeholder="Search notes" autocomplete="off">

      <div id="notes" class="notes"></div>
    </section>

    <section id="editor" class="screen hide">
      <div class="editor-top">
        <button id="back" class="small-btn" type="button" aria-label="Back">‹</button>
        <p>Writing</p>
      </div>

      <textarea id="title" class="title" rows="1" placeholder="Untitled note"></textarea>

      <div id="blocks" class="blocks"></div>
    </section>

    <nav id="toolbar" class="toolbar hide">
      <button class="tool" type="button" data-tool="bold"><b>B</b></button>
      <button class="tool" type="button" data-tool="italic"><i>I</i></button>
      <button class="tool" type="button" data-tool="underline"><u>U</u></button>
      <button class="tool" type="button" data-tool="bullet">•</button>
      <button class="tool" type="button" data-tool="number">1.</button>
      <button class="tool" type="button" data-tool="task">☐</button>
      <button class="tool" type="button" data-tool="heading">H</button>
      <button class="tool" type="button" data-tool="text">+</button>
    </nav>
  </main>

  <script>
    const saveName = "my-notes";

    let notes = JSON.parse(localStorage.getItem(saveName)) || [];
    let openNoteId = notes[0] ? notes[0].id : "";

    const home = document.getElementById("home");
    const editor = document.getElementById("editor");
    const notesBox = document.getElementById("notes");
    const blocksBox = document.getElementById("blocks");
    const toolbar = document.getElementById("toolbar");
    const title = document.getElementById("title");
    const search = document.getElementById("search");

    function save() {
      localStorage.setItem(saveName, JSON.stringify(notes));
    }

    function id() {
      return Date.now().toString() + Math.floor(Math.random() * 100000);
    }

    function openNote() {
      return notes.find(note => note.id === openNoteId);
    }

    function plainText(html) {
      let div = document.createElement("div");
      div.innerHTML = html || "";
      return div.textContent || "";
    }

    function showHome() {
      home.classList.remove("hide");
      editor.classList.add("hide");
      toolbar.classList.add("hide");
      drawNotes();
    }

    function showEditor() {
      home.classList.add("hide");
      editor.classList.remove("hide");
      toolbar.classList.remove("hide");
      drawEditor();
    }

    function newNote() {
      let note = {
        id: id(),
        title: "",
        blocks: [
          {
            id: id(),
            type: "text",
            text: ""
          }
        ]
      };

      notes.unshift(note);
      openNoteId = note.id;
      save();
      showEditor();

      setTimeout(function () {
        title.focus();
      }, 50);
    }

    function drawNotes() {
      let word = search.value.toLowerCase();
      let html = "";

      notes.forEach(function (note) {
        let body = "";

        note.blocks.forEach(function (block) {
          body += " " + plainText(block.text);
        });

        let allText = (note.title + " " + body).toLowerCase();

        if (!allText.includes(word)) {
          return;
        }

        let first = note.blocks[0];
        let preview = first ? plainText(first.text).slice(0, 80) : "";

        html += `
          <button class="note-card" type="button" data-id="${note.id}">
            <strong>${note.title || "Untitled note"}</strong>
            <span>${preview || "No content yet."}</span>
          </button>
        `;
      });

      if (html === "") {
        html = `<p class="empty">No notes yet.</p>`;
      }

      notesBox.innerHTML = html;
    }

    function drawEditor() {
      let note = openNote();

      if (!note) {
        showHome();
        return;
      }

      title.value = note.title;
      blocksBox.innerHTML = "";

      note.blocks.forEach(function (block) {
        let row = document.createElement("div");
        row.className = "block";

        if (block.type === "bullet") {
          row.innerHTML += `<span class="marker">•</span>`;
        }

        if (block.type === "number") {
          row.innerHTML += `<span class="marker">1.</span>`;
        }

        if (block.type === "task") {
          row.innerHTML += `<button class="check" type="button"></button>`;
        }

        let text = document.createElement("div");
        text.className = block.type === "heading" ? "text big" : "text";
        text.contentEditable = "true";
        text.dataset.id = block.id;
        text.dataset.placeholder = "Write something";
        text.innerHTML = block.text || "";

        row.appendChild(text);
        blocksBox.appendChild(row);
      });
    }

    function addBlock(type) {
      let note = openNote();

      if (!note) {
        return;
      }

      note.blocks.push({
        id: id(),
        type: type,
        text: ""
      });

      save();
      drawEditor();

      setTimeout(function () {
        let allTextBoxes = blocksBox.querySelectorAll(".text");
        allTextBoxes[allTextBoxes.length - 1].focus();
      }, 30);
    }

    document.getElementById("addNote").onclick = newNote;
    document.getElementById("back").onclick = showHome;

    search.oninput = drawNotes;

    notesBox.onclick = function (event) {
      let card = event.target.closest(".note-card");

      if (!card) {
        return;
      }

      openNoteId = card.dataset.id;
      save();
      showEditor();
    };

    title.oninput = function () {
      let note = openNote();

      if (!note) {
        return;
      }

      note.title = title.value;
      save();
    };

    blocksBox.oninput = function (event) {
      let box = event.target.closest(".text");
      let note = openNote();

      if (!box || !note) {
        return;
      }

      note.blocks.forEach(function (block) {
        if (block.id === box.dataset.id) {
          block.text = box.innerHTML;
        }
      });

      save();
    };

    toolbar.onclick = function (event) {
      let button = event.target.closest("[data-tool]");

      if (!button) {
        return;
      }

      let tool = button.dataset.tool;

      if (tool === "bold") {
        document.execCommand("bold");
        return;
      }

      if (tool === "italic") {
        document.execCommand("italic");
        return;
      }

      if (tool === "underline") {
        document.execCommand("underline");
        return;
      }

      addBlock(tool);
    };

    if (notes.length === 0) {
      newNote();
    } else {
      showHome();
    }
  </script>
</body>
</html>
