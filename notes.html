<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #000;
      --panel: rgba(20, 27, 42, 0.84);
      --panel-strong: rgba(25, 33, 50, 0.96);
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: #f7f8ff;
      --muted: #a5adbd;
      --blue: #5a8cff;
      --green: #46d29c;
      --orange: #ff9a52;
      --yellow: #ffd33d;
      --pink: #ff74ba;
      --teal: #46d7c5;
      --purple: #9d70ff;
      --red: #ff7276;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      --nav-height: 94px;
      --keyboard-offset: 0px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    html {
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      height: 100%;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: default;
      touch-action: manipulation;
    }

    input,
    textarea,
    [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
    }

    .phone {
      position: relative;
      width: min(100%, 430px);
      height: min(932px, calc(100dvh - 44px));
      max-height: 100dvh;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(180deg, #04060c 0%, #000 42%, #000 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 72%, transparent 100%);
      opacity: 0.22;
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      padding: 52px 22px 120px;
      overscroll-behavior: contain;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    #editorView .editor-title,
#editorView .blocks,
#editorView .add-line {
  margin-left: 22px;
  margin-right: 22px;
  width: calc(100% - 44px);
}
.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

 .topbar.center {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 12;

  width: 100%;
  margin: 0 0 14px;
  padding: 14px 22px 10px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;

  background: linear-gradient(
    180deg,
    rgba(4, 6, 12, 0.96),
    rgba(4, 6, 12, 0.76) 72%,
    transparent
  );
  backdrop-filter: none;
}
    .title-stack {
      min-width: 0;
      flex: 1;
    }

    .kicker {
      margin: 0 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 44px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 150ms ease, background 150ms ease;
    }

    .icon-btn:active,
    .note-card:active,
    .action-btn:active,
    .toolbar button:active {
      transform: scale(0.96);
    }

    .icon-btn.primary {
      color: #fff;
      background: linear-gradient(140deg, #48a7ff 0%, #7d7aff 48%, #aa62ff 100%);
      box-shadow: 0 14px 30px rgba(90, 140, 255, 0.34);
    }

    .icon-btn.danger {
      color: #fff;
      background: color-mix(in srgb, var(--red) 30%, rgba(255, 255, 255, 0.06));
    }

    .search {
      position: relative;
      margin-bottom: 45px;
    }

    .search i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.48);
      font-size: 14px;
    }

    .search input {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      outline: none;
      color: var(--text);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        rgba(12, 17, 28, 0.86);
      padding: 0 14px 0 41px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .search input::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .note-list {
      display: grid;
      gap: 16px;
      padding-top: 25px;
      margin-bottom: 42px;
    }

    .note-card {
      --accent: var(--blue);
      position: relative;
      width: 100%;
      min-width: 0;
      display: grid;
      gap: 12px;
      padding: 16px;
      text-align: left;
      border-radius: 20px;
      color: var(--text);
      background:
        linear-gradient(95deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent 52%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.022)),
        rgba(12, 17, 28, 0.94);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

 .selection-active .note-card.selected {
  border-color: rgba(125, 122, 255, 0.9);
  box-shadow:
    0 0 0 2px rgba(90, 140, 255, 0.55),
    0 0 24px rgba(157, 112, 255, 0.35),
    0 18px 42px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.block-group {
  display: grid;
  gap: 3px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: 20px;
}

.selection-active .block-group.selected {
  border-color: rgba(125, 122, 255, 0.9);
  box-shadow:
    0 0 0 2px rgba(90, 140, 255, 0.55),
    0 0 24px rgba(157, 112, 255, 0.35),
    0 18px 42px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  background: transparent;
}
.selection-active .block-group.selected .block {
  border-color: transparent !important;
  box-shadow: none !important;
  background: transparent !important;
}

.selection-active .block-group.selected .block.selected {
  border-color: transparent;
  box-shadow: none;
  background: transparent;
}

.selection-active .block-group.selected .block {
  border-color: transparent;
  box-shadow: none;
}
    .note-card.reveal-delete,
    .block.reveal-delete {
      border-color: color-mix(in srgb, var(--red) 70%, rgba(255, 255, 255, 0.2));
    }

    .note-main {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
      min-width: 0;
    }

    .note-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--accent);
      background:
        radial-gradient(circle at 36% 28%, color-mix(in srgb, var(--accent) 44%, white), transparent 34%),
        rgba(255, 255, 255, 0.065);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 34%, rgba(255, 255, 255, 0.08));
    }

    .note-copy {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .note-title {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .note-preview {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.36;
      overflow-wrap: anywhere;
    }

.note-actions {
  display: none;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
}

.notes-tools-open .note-actions {
  display: none;
}

.selection-bar .note-tool {
  display: none;
}

.note-selection .selection-bar .note-tool {
  display: grid;
}
    .empty-state {
      min-height: 230px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.64);
      font-size: 22px;
      font-weight: 900;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 150ms ease;
    }

    .action-btn.pin.active {
      color: #06101d;
      background: var(--yellow);
    }

    .action-btn.delete,
    .delete-reveal {
      color: #fff;
      background: color-mix(in srgb, var(--red) 30%, rgba(255, 255, 255, 0.06));
    }

    .dragging {
      opacity: 0.58;
      transform: scale(0.985);
    }

    .editor-title {
      width: 100%;
      min-height: 44px;
      margin: 0 0 12px;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      font-size: 34px;
      font-weight: 920;
      line-height: 1.07;
      letter-spacing: 0;
      resize: none;
      overflow: hidden;
    }

    .editor-title::placeholder {
      color: rgba(255, 255, 255, 0.34);
    }

    .blocks {
      display: grid;
      gap: 3px;
      padding-bottom: 500px;
    }

    .block {
      --accent: var(--blue);
      position: relative;
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .block:focus-within {
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.07);
    }

.selection-active .blocks > .block.selected {
  border-color: rgba(125, 122, 255, 0.9);
  box-shadow:
    0 0 0 2px rgba(90, 140, 255, 0.55),
    0 0 24px rgba(157, 112, 255, 0.35),
    0 18px 42px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.selection-active .block-group.selected .block.selected {
  background: transparent;
}

.selection-active .block-group.selected .block.selected {
  background: transparent;
}
    .selection-active [contenteditable="true"] {
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
  caret-color: transparent;
}

    .block.drop-before::before,
    .block.drop-after::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    .block.drop-before::before {
      top: -3px;
    }

    .block.drop-after::after {
      bottom: -3px;
    }

  .block.grouped {
  border-color: transparent;
  background: transparent;
}

    .block-line {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
    }

    .editable {
      min-width: 0;
      min-height: 27px;
      outline: none;
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .editable:empty::before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.34);
    }

    .heading .editable {
      font-size: 24px;
      font-weight: 920;
      line-height: 1.12;
    }

    .size-title .editable {
      font-size: 31px;
      font-weight: 940;
      line-height: 1.08;
    }

    .size-heading .editable {
      font-size: 24px;
      font-weight: 920;
      line-height: 1.12;
    }

    .size-subtitle .editable {
      font-size: 20px;
      font-weight: 820;
      line-height: 1.22;
      color: rgba(255, 255, 255, 0.88);
    }

    .size-text .editable {
      font-size: 16px;
      font-weight: 500;
    }

    .size-subtext .editable {
      font-size: 13px;
      line-height: 1.38;
      color: var(--muted);
    }

    .quote .editable {
      padding-left: 13px;
      border-left: 3px solid var(--accent);
      color: rgba(255, 255, 255, 0.82);
      font-style: italic;
    }

    .card .editable {
      padding: 15px;
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(12, 17, 28, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
    }

    .bullet .block-line,
    .number .block-line,
    .task .block-line {
      grid-template-columns: auto 1fr;
      align-items: start;
    }

    .marker {
      min-width: 24px;
      height: 27px;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 850;
    }

    .task-check {
      width: 24px;
      height: 24px;
      margin-top: 1px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #06101d;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.2);
    }

    .task-check.checked {
      background: var(--green);
      box-shadow: 0 0 18px rgba(70, 210, 156, 0.28);
    }

    .task.done .editable {
      color: rgba(255, 255, 255, 0.44);
      text-decoration: line-through;
    }

    .image-block {
      overflow: hidden;
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025)),
        rgba(12, 17, 28, 0.84);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.085);
    }

    .image-open {
      width: 100%;
      display: block;
      padding: 0;
      text-align: left;
      border-radius: 18px;
      overflow: hidden;
    }

    .image-block img {
      display: block;
      width: 100%;
      height: 184px;
      object-fit: cover;
    }

    .empty-image {
      min-height: 150px;
      display: grid;
      place-items: center;
      gap: 8px;
      color: var(--pink);
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 116, 186, 0.32), transparent 28%),
        linear-gradient(135deg, rgba(90, 140, 255, 0.22), rgba(157, 112, 255, 0.16), rgba(70, 215, 197, 0.16));
    }

    .empty-image i {
      font-size: 32px;
    }

    .add-line {
      width: 100%;
      min-height: 112px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 20px;
      text-align: center;
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.52);
      background: rgba(255, 255, 255, 0.025);
      border: 1px dashed rgba(255, 255, 255, 0.12);
    }

    .add-line i {
      color: var(--blue);
      font-size: 22px;
    }

    .toolbar {
  position: fixed;
  left: 18px;
  right: 18px;
  bottom: calc(10px + var(--keyboard-offset));
  z-index: 30;
  display: none;
  gap: 7px;
  overflow-x: auto;
  padding: 9px;
  border-radius: 22px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.115), rgba(255, 255, 255, 0.038)),
    rgba(17, 23, 35, 0.94);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
}

.editor-active .toolbar {
  display: flex;
}

@media (min-width: 461px) {
  .editor-active .toolbar {
    display: none;
  }

  .editor-active.selection-active .toolbar {
    display: flex;
  }

  .toolbar {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: calc(var(--nav-height) + 24px);
    z-index: 19;
  }
}

    .toolbar button {
      min-width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.065);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 150ms ease;
    }

    .toolbar .primary {
      color: #fff;
      background: linear-gradient(140deg, #48a7ff 0%, #7d7aff 48%, #aa62ff 100%);
    }

    .insert-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .insert-option {
      min-height: 74px;
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      text-align: left;
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
    }

    .insert-option i {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .insert-option span {
      min-width: 0;
      font-size: 14px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .selection-bar {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: calc(var(--nav-height) + 12px + var(--keyboard-offset));
      z-index: 18;
      display: none;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045)),
        rgba(17, 23, 35, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.52), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
    }

    .selection-active .selection-bar {
      display: grid;
    }

    .selection-bar .block-tool {
      display: none;
    }

    .block-selection .selection-bar .block-tool {
      display: grid;
    }

    .selection-active.editor-active .toolbar {
      display: none;
    }

    .selection-text {
      min-width: 0;
      display: grid;
      gap: 3px;
      padding-left: 4px;
    }

    .selection-text strong {
      font-size: 13px;
      font-weight: 900;
    }

    .selection-text span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selection-actions {
      display: flex;
      gap: 7px;
      overflow-x: auto;
    }

    .selection-actions .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 13px;
    }
.icon-btn.ungroup-mode {
  position: relative;
}

.icon-btn.ungroup-mode::after {
  content: "";
  position: absolute;
  width: 28px;
  height: 3px;
  border-radius: 999px;
  background: #000;
  transform: rotate(-45deg);
  pointer-events: none;
}
    .nav {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      height: 78px;
      display: grid;
      grid-template-columns: 1fr 1fr 64px 1fr 1fr;
      align-items: center;
      gap: 7px;
      padding: 9px;
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.115), rgba(255, 255, 255, 0.038)),
        rgba(17, 23, 35, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
    }

    .nav-item,
    .nav-add {
      min-width: 0;
      display: grid;
      place-items: center;
      gap: 4px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 10px;

function moveNoteCard(id, direction) {
  const notes = sortedNotes();
  const index = notes.findIndex(note => note.id === id);
  const targetIndex = index + direction;

  if (index < 0 || targetIndex < 0 || targetIndex >= notes.length) return;

  const current = notes[index];
  const target = notes[targetIndex];

  if (current.pinned !== target.pinned) return;

  notes.splice(index, 1);
  notes.splice(targetIndex, 0, current);

  notes.forEach((note, i) => {
    note.order = i;
  });

  saveState();
  renderNotes();
}
