<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routine Dashboard</title>
  <style>
    :root {
      --bg: #050912;
      --panel: rgba(20, 27, 42, 0.76);
      --panel-strong: rgba(25, 33, 50, 0.9);
      --line: rgba(255, 255, 255, 0.11);
      --text: #f7f8ff;
      --muted: #a5adbd;
      --blue: #5a8cff;
      --green: #46d29c;
      --orange: #ff9a52;
      --yellow: #ffd33d;
      --pink: #ff74ba;
      --teal: #46d7c5;
      --purple: #9d70ff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        linear-gradient(135deg, #030610 0%, #070d19 46%, #06101c 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(67, 98, 155, 0.26), transparent 58%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: transparent;
      cursor: default;
    }

    .phone {
      position: relative;
      width: min(100%, 430px);
      min-height: 932px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(180deg, #080d18 0%, #050812 42%, #060a13 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 72%, transparent 100%);
      opacity: 0.22;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 932px;
      padding: 54px 24px 116px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 34px;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--muted);
