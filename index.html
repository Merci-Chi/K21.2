<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routine Dashboard</title>
  <style>
    :root {
      --bg: #050912;
      --panel: rgba(20, 27, 42, 0.76);
      --panel-strong: rgba(25, 33, 50, 0.9);
      --line: rgba(255, 255, 255, 0.11);
      --text: #f7f8ff;
      --muted: #a5adbd;
      --blue: #5a8cff;
      --green: #46d29c;
      --orange: #ff9a52;
      --yellow: #ffd33d;
      --pink: #ff74ba;
      --teal: #46d7c5;
      --purple: #9d70ff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        linear-gradient(135deg, #030610 0%, #070d19 46%, #06101c 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(67, 98, 155, 0.26), transparent 58%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: transparent;
      cursor: default;
    }

    .phone {
      position: relative;
      width: min(100%, 430px);
      min-height: 932px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(180deg, #080d18 0%, #050812 42%, #060a13 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 72%, transparent 100%);
      opacity: 0.22;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 932px;
      padding: 54px 24px 116px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 34px;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(33px, 9vw, 43px);
      line-height: 1.04;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .wave {
      display: inline-block;
      margin-left: 3px;
      filter: drop-shadow(0 10px 18px rgba(255, 187, 64, 0.28));
      transform: rotate(-8deg);
    }

    .bell {
      position: relative;
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
      margin-top: 1px;
    }

    .bell svg {
      width: 29px;
      height: 29px;
      stroke: rgba(255, 255, 255, 0.88);
      stroke-width: 2.2;
    }

    .bell::after {
      content: "";
      position: absolute;
      top: 8px;
      right: 9px;
      width: 11px;
      height: 11px;
      border: 3px solid #202639;
      border-radius: 50%;
      background: #ff6d6f;
      box-shadow: 0 0 18px rgba(255, 109, 111, 0.72);
    }

    .habit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px 18px;
      margin-bottom: 42px;
    }

    .habit {
      min-width: 0;
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .bubble {
      position: relative;
      width: min(30vw, 114px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.02) 54%),
        rgba(17, 23, 35, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
      box-shadow:
        inset 0 16px 28px rgba(255, 255, 255, 0.04),
        inset 0 -18px 32px rgba(0, 0, 0, 0.28),
        var(--soft-shadow);
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 52%);
      opacity: 0.72;
      pointer-events: none;
    }

    .icon-bubble {
      --glow: var(--blue);
      border-color: rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 38% 30%, color-mix(in srgb, var(--glow) 14%, transparent), transparent 42%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02) 54%),
        rgba(17, 23, 35, 0.88);
      box-shadow:
        inset 0 18px 30px rgba(255, 255, 255, 0.045),
        inset 0 -20px 34px rgba(0, 0, 0, 0.31),
        var(--soft-shadow);
    }

    .habit svg {
      position: relative;
      z-index: 1;
      width: 82px;
      height: 82px;
      overflow: visible;
      filter:
        drop-shadow(0 13px 16px rgba(0, 0, 0, 0.4))
        drop-shadow(0 0 12px color-mix(in srgb, currentColor 28%, transparent));
    }

    .glyph-outline {
      fill: none;
      stroke: #07101e;
      stroke-width: 9;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.96;
    }

    .glyph-line {
      fill: none;
      stroke: #07101e;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.92;
    }

    .habit-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .yellow { color: var(--yellow); }
    .green { color: #59df63; }
    .purple { color: #c177ff; }
    .blue { color: var(--blue); }
    .pink { color: var(--pink); }
    .teal { color: var(--teal); }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 17px;
    }

    h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .view-all {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--blue);
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
    }

    .view-all svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.8;
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task-card {
      --accent: var(--blue);
      position: relative;
      min-height: 82px;
      display: grid;
      grid-template-columns: 54px 1fr 24px;
      align-items: center;
      gap: 10px;
      padding: 17px 19px 17px 20px;
      border-radius: 17px;
      background:
        linear-gradient(95deg, color-mix(in srgb, var(--accent) 13%, transparent), transparent 46%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        var(--panel);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 28%, transparent);
      justify-self: center;
    }

    .task-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
    }

    .tag svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.1;
    }

    .chevron {
      width: 24px;
      height: 24px;
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 2.8;
      justify-self: end;
    }

    .nav {
      position: absolute;
      z-index: 2;
      left: 18px;
      right: 18px;
      bottom: 18px;
      min-height: 76px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03)),
        rgba(18, 24, 36, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(26px);
    }

    .nav-item {
      min-width: 0;
      height: 58px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      color: rgba(255, 255, 255, 0.66);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .nav-item svg {
      width: 27px;
      height: 27px;
      stroke-width: 2.25;
    }

    .nav-item.active {
      color: var(--blue);
    }

    .add {
      position: relative;
      width: 62px;
      height: 62px;
      margin: -22px auto 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.52), transparent 27%),
        linear-gradient(140deg, #48a7ff 0%, #7d7aff 48%, #aa62ff 100%);
      box-shadow: 0 14px 36px rgba(98, 119, 255, 0.52);
      color: white;
    }

    .add svg {
      width: 32px;
      height: 32px;
      stroke-width: 2.4;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 460px) {
      body {
        padding: 0;
        display: block;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        border: 0;
      }

      .app {
        min-height: 100vh;
        padding: 54px 21px 112px;
      }

      .bubble {
        width: 29vw;
        max-width: 112px;
      }

      .habit-grid {
        gap: 29px 12px;
      }
    }

    @media (max-width: 350px) {
      .app {
        padding-inline: 16px;
      }

      .habit-title {
        font-size: 16px;
      }

      .habit svg {
        width: 90px;
        height: 90px;
      }

      .task-card {
        grid-template-columns: 44px 1fr 20px;
        padding-inline: 14px;
      }
    }
  </style>
</head>

                </svg>
                Personal
              </span>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </article>

          <article class="task-card" style="--accent: var(--green)">
            <span class="check" aria-hidden="true"></span>

                  <path d="M9 13h6" stroke="currentColor" stroke-linecap="round" />
                </svg>
                Work
              </span>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </article>

          <article class="task-card" style="--accent: var(--orange)">
            <span class="check" aria-hidden="true"></span>
            <div>
              <p class="task-title">Go for a walk</p>
              <span class="tag">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 19h14M5 19l3-4 3 2 2-5 4 3 2 4M9 8l2-3 3 2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Health
              </span>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </article>
        </div>
      </section>
