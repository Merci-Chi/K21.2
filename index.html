  <script>
    const HOLD_MS = 900;

    function bindHold(element, { activeClass, completeClass, onComplete, ignoreSelector }) {
      let timer = null;
      let completedByHold = false;

      const cancel = () => {
        clearTimeout(timer);
        timer = null;
        element.classList.remove(activeClass);
      };

      element.addEventListener("pointerdown", (event) => {
        if (ignoreSelector && event.target.closest(ignoreSelector)) return;
        completedByHold = false;
        element.setPointerCapture?.(event.pointerId);
        if (!element.classList.contains(completeClass)) {
          element.classList.add(activeClass);
        }
        timer = window.setTimeout(() => {
          completedByHold = true;
          element.classList.remove(activeClass);
          element.classList.toggle(completeClass);
          onComplete?.(element);
        }, HOLD_MS);
      });

      element.addEventListener("pointerup", cancel);
      element.addEventListener("pointercancel", cancel);
      element.addEventListener("pointerleave", cancel);
      element.addEventListener("contextmenu", (event) => event.preventDefault());

      element.addEventListener("click", (event) => {
        if (completedByHold) {
          event.preventDefault();
          event.stopPropagation();
          completedByHold = false;
        }
      }, true);
    }

    document.querySelectorAll(".habit").forEach((habit) => {
      bindHold(habit, {
        activeClass: "is-holding",
        completeClass: "is-filled"
      });
    });

    document.querySelectorAll(".task-card").forEach((task) => {
      const check = task.querySelector(".check");
      const hasNotes = Boolean(task.dataset.notes);

      bindHold(task, {
        activeClass: "is-holding",
        completeClass: "completed",
        ignoreSelector: ".check"
      });

      check?.addEventListener("click", (event) => {
        event.stopPropagation();
        task.classList.toggle("completed");
      });

      task.addEventListener("click", (event) => {
        if (event.target.closest(".check") || !hasNotes) return;
        task.classList.toggle("open");
      });
    });
  </script>
