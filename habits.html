<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Habits</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      :root {
        --bg: #000;
        --line: rgba(255, 255, 255, 0.11);
        --text: #f7f8ff;
        --muted: #a5adbd;
        --blue: #5a8cff;
        --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        scrollbar-width: none;
      }

      *::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      html {
        height: 100%;
        background: #000;
        touch-action: manipulation;
        overflow: hidden;
        scrollbar-width: none;
      }

      body {
        height: 100%;
        margin: 0;
        color: var(--text);
        background: #000;
        display: grid;
        place-items: center;
        padding: 22px;
        overscroll-behavior: none;
        overflow: hidden;
        scrollbar-width: none;
      }

      button {
        font: inherit;
        color: inherit;
        border: 0;
        background: transparent;
        cursor: default;
        touch-action: manipulation;
      }

      .phone {
        position: relative;
        width: min(100%, 430px);
        height: min(932px, calc(100dvh - 44px));
        min-height: 0;
        max-height: 100dvh;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 34px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 28%),
          linear-gradient(180deg, #04060c 0%, #000 42%, #000 100%);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .phone::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 46px 46px;
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 18%,
          black 72%,
          transparent 100%
        );
        opacity: 0.22;
      }

      .app {
        position: relative;
        z-index: 1;
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: none;
        padding: 54px 24px 116px;
      }

      .topbar {
        margin-bottom: 26px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 9vw, 44px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .kicker {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
        font-weight: 700;
      }

      .habit-list {
        display: grid;
        gap: 12px;
      }

      .empty-state {
        min-height: 310px;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        border-radius: 22px;
        color: rgba(255, 255, 255, 0.72);
        background:
          radial-gradient(
            circle at 50% 10%,
            rgba(90, 140, 255, 0.2),
            transparent 34%
          ),
          linear-gradient(
            145deg,
            rgba(255, 255, 255, 0.055),
            rgba(255, 255, 255, 0.018)
          );
        border: 1px dashed rgba(255, 255, 255, 0.13);
      }

      .empty-state-inner {
        display: grid;
        justify-items: center;
        gap: 12px;
        max-width: 250px;
      }

      .empty-state i {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        color: #fff;
        background: linear-gradient(135deg, var(--blue), var(--pink));
        box-shadow: 0 18px 36px rgba(90, 140, 255, 0.24);
        font-size: 22px;
      }

      .empty-state strong {
        font-size: 22px;
        font-weight: 920;
        line-height: 1.12;
      }

      .empty-state span {
        color: rgba(255, 255, 255, 0.52);
        font-size: 13px;
        font-weight: 720;
        line-height: 1.35;
      }

      .empty-state button {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 2px;
        padding: 0 14px;
        border-radius: 14px;
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        font-size: 14px;
        font-weight: 850;
      }

      .empty-arrow {
        width: 118px;
        height: 88px;
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.7);
        transform: rotate(12deg);
      }

      .empty-arrow path {
        stroke: currentColor;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 7 8;
      }

      .habit-row {
        --accent: var(--blue);
        position: relative;
        display: grid;
        gap: 11px;
        padding: 15px 54px 15px 15px;
        border-radius: 18px;
        background:
          linear-gradient(
            95deg,
            color-mix(in srgb, var(--accent) 12%, transparent),
            transparent 52%
          ),
          linear-gradient(
            145deg,
            rgba(255, 255, 255, 0.065),
            rgba(255, 255, 255, 0.022)
          ),
          rgba(12, 17, 28, 0.94);
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent);
        box-shadow:
          var(--soft-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .habit-main {
        display: grid;
        justify-items: stretch;
        text-align: left;
        gap: 10px;
      }

      .habit-label {
        margin: 0;
        color: var(--text);
        font-size: 17px;
        font-weight: 850;
        letter-spacing: 0;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        justify-self: start;
      }

      .habit-label svg,
      .habit-label i {
        width: 19px;
        height: 19px;
        color: var(--accent);
        stroke-width: 2.25;
      }

      .habit-label i {
        display: inline-grid;
        place-items: center;
        font-size: 18px;
        line-height: 1;
      }

      .week-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 7px;
        align-items: start;
      }

      .week-cell {
        display: grid;
        justify-items: center;
        gap: 7px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        font-weight: 850;
        text-align: center;
        line-height: 1;
      }

      .dot {
        width: 16px;
        height: 16px;
        min-width: 16px;
        min-height: 16px;
        aspect-ratio: 1;
        display: block;
        margin: 0 auto;
        border-radius: 50%;
        background: #030710;
        border: 1.6px solid rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      }

      .dot.done {
        background: #fff;
        border-color: #fff;
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.28);
      }

      .dot.half {
        background: linear-gradient(90deg, #fff 0 50%, #030710 50% 100%);
        border-color: #fff;
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.2);
      }

      .month-panel {
        display: none;
        padding-top: 5px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .habit-row.open .month-panel {
        display: grid;
        gap: 11px;
      }

      .month-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 12px;
        font-weight: 850;
      }

      .close-month {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 9px 8px;
        align-items: center;
      }

      .month-dot {
        display: grid;
        justify-items: center;
        gap: 4px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 9px;
        font-weight: 800;
        line-height: 1;
      }

      .edit-habit {
        position: absolute;
        top: 13px;
        right: 13px;
        width: 31px;
        height: 31px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }

      .edit-habit svg {
        width: 16px;
        height: 16px;
        stroke-width: 2.3;
      }

      .edit-habit .minus-icon {
        display: none;
      }

      .habit-row.editing .edit-habit .pencil-icon {
        display: none;
      }

      .habit-row.editing .edit-habit .minus-icon {
        display: block;
      }

      .habit-actions {
        display: none;
        gap: 8px;
        padding-top: 2px;
      }

      .habit-row.editing .habit-actions {
        display: flex;
      }

      .habit-action {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        color: rgba(255, 255, 255, 0.8);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .habit-action.delete {
        color: #ff7b7d;
        margin-left: auto;
      }

      .habit-action svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.2;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        align-items: flex-end;
        justify-content: center;
        padding: 14px 18px calc(98px + env(safe-area-inset-bottom));
        background: rgba(2, 6, 14, 0.58);
        backdrop-filter: blur(12px);
        overflow: hidden;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .habit-modal {
        width: min(100%, 430px);
        max-height: min(78dvh, 760px);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: none;
        border-radius: 24px;
        padding: 16px;
        background:
          linear-gradient(
            145deg,
            rgba(255, 255, 255, 0.11),
            rgba(255, 255, 255, 0.035)
          ),
          rgba(17, 23, 35, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 12px;
      }

      .modal-title {
        margin: 0;
        font-size: 21px;
        font-weight: 850;
      }

      .modal-close {
        width: 34px;
        height: 34px;
        border-radius: 11px;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.76);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .habit-form {
        display: grid;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        font-weight: 800;
      }

      .field input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 13px;
        padding: 11px 12px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      .choice-row,
      .color-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mode-picker {
        display: grid;
        grid-template-columns: repeat(2, 74px);
        gap: 6px;
      }

      .choice-pill {
        width: 100%;
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 11.5px;
        font-weight: 850;
        line-height: 1;
        text-align: center;
        background: rgba(255, 255, 255, 0.055);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
      }

      .choice-pill.active {
        color: var(--text);
        background: color-mix(
          in srgb,
          var(--blue) 24%,
          rgba(255, 255, 255, 0.055)
        );
        box-shadow: inset 0 0 0 1px
          color-mix(in srgb, var(--blue) 54%, rgba(255, 255, 255, 0.1));
      }

      .categorized-icon-picker {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .icon-category-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 1px;
        align-items: stretch;
      }

      .icon-category {
        min-width: 0;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 7px;
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 11.5px;
        font-weight: 850;
        background: rgba(255, 255, 255, 0.055);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
        white-space: nowrap;
      }

      .icon-category.active {
        color: var(--text);
        background: color-mix(
          in srgb,
          var(--blue) 24%,
          rgba(255, 255, 255, 0.055)
        );
        box-shadow: inset 0 0 0 1px
          color-mix(in srgb, var(--blue) 54%, rgba(255, 255, 255, 0.1));
      }

      .icon-category i {
        font-size: 13px;
        line-height: 1;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(6, 40px);
        justify-content: space-between;
        gap: 7px 5px;
        padding: 1px;
      }

      .icon-choice {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 13px;
        color: rgba(255, 255, 255, 0.68);
        background: rgba(255, 255, 255, 0.055);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
      }

      .icon-choice.active {
        color: var(--text);
        background: color-mix(
          in srgb,
          var(--blue) 24%,
          rgba(255, 255, 255, 0.055)
        );
        box-shadow:
          inset 0 0 0 1px
            color-mix(in srgb, var(--blue) 54%, rgba(255, 255, 255, 0.1)),
          0 0 20px color-mix(in srgb, var(--blue) 18%, transparent);
      }

      .icon-choice svg,
      .icon-choice i {
        width: 21px;
        height: 21px;
        stroke-width: 2.25;
      }

      .icon-choice i {
        display: grid;
        place-items: center;
        font-size: 20px;
        line-height: 1;
      }

      .icon-empty {
        grid-column: 1 / -1;
        min-height: 42px;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.52);
        font-size: 12px;
        font-weight: 800;
      }

      .icon-pager {
        display: grid;
        grid-template-columns: 34px 1fr 34px;
        align-items: center;
        gap: 8px;
        min-height: 34px;
      }

      .icon-page-button {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.78);
        background: rgba(255, 255, 255, 0.055);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
      }

      .icon-page-button:disabled {
        opacity: 0.34;
      }

      .icon-page-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: rgba(255, 255, 255, 0.52);
        font-size: 11.5px;
        font-weight: 850;
        text-align: center;
      }

      .icon-page-number {
        min-width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.62);
        background: rgba(255, 255, 255, 0.045);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.075);
      }

      .icon-page-number.active {
        color: var(--text);
        background: color-mix(
          in srgb,
          var(--blue) 22%,
          rgba(255, 255, 255, 0.055)
        );
        box-shadow: inset 0 0 0 1px
          color-mix(in srgb, var(--blue) 46%, rgba(255, 255, 255, 0.1));
      }

      .color-swatch {
        --swatch: var(--blue);
        width: 31px;
        height: 31px;
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 30% 24%,
            rgba(255, 255, 255, 0.42),
            transparent 34%
          ),
          var(--swatch);
        box-shadow:
          0 10px 22px color-mix(in srgb, var(--swatch) 24%, transparent),
          inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        position: relative;
      }

      .color-swatch.active::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: inherit;
        border: 2px solid rgba(255, 255, 255, 0.76);
      }

      .form-submit {
        min-height: 46px;
        border-radius: 15px;
        color: white;
        font-weight: 850;
        background:
          radial-gradient(
            circle at 28% 18%,
            rgba(255, 255, 255, 0.42),
            transparent 32%
          ),
          linear-gradient(140deg, #48a7ff 0%, #7d7aff 48%, #aa62ff 100%);
        box-shadow: 0 14px 32px rgba(98, 119, 255, 0.34);
      }

      @media (max-width: 460px) {
        body {
          padding: 0;
          display: block;
        }

        .phone {
          width: 100%;
          height: 100dvh;
          min-height: 0;
          max-height: 100dvh;
          border-radius: 0;
          border: 0;
        }

        .app {
          height: 100%;
          min-height: 0;
          padding: 54px 21px 112px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Habits history">
      <div class="app">
        <header class="topbar">
          <h1>Habits</h1>
          <p class="kicker">Weekly rhythm at a glance.</p>
        </header>

        <section
          class="habit-list"
          aria-label="Habit completion history"
        ></section>
      </div>

      <nav class="nav" aria-label="Primary navigation">
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M3 10.7 12 3l9 7.7V20a1 1 0 0 1-1 1h-5.2v-6.6H9.2V21H4a1 1 0 0 1-1-1v-9.3Z"
            />
          </svg>
          Home
        </button>
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="8" stroke="currentColor" />
            <circle cx="12" cy="12" r="3" stroke="currentColor" />
          </svg>
          Habits
        </button>
        <button class="add" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 5v14M5 12h14"
              stroke="currentColor"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M6 3h8l4 4v14H6V3Z"
              stroke="currentColor"
              stroke-linejoin="round"
            />
            <path
              d="M14 3v5h5M9 13h6M9 17h4"
              stroke="currentColor"
              stroke-linecap="round"
            />
          </svg>
          Notes
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="4" stroke="currentColor" />
            <path
              d="M4 21a8 8 0 0 1 16 0"
              stroke="currentColor"
              stroke-linecap="round"
            />
          </svg>
          Profile
        </button>
      </nav>
      <div class="modal-backdrop" id="habitModal" aria-hidden="true">
        <section
          class="habit-modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="habitModalTitle"
        >
          <div class="modal-head">
            <h2 class="modal-title" id="habitModalTitle">Edit habit</h2>
            <button
              class="modal-close"
              type="button"
              aria-label="Close habit form"
            >
              x
            </button>
          </div>
          <form class="habit-form">
            <label class="field">
              Title
              <input
                name="label"
                type="text"
                placeholder="Habit title"
                required
              />
            </label>
            <div class="field">
              Icon
              <div
                class="choice-row icon-picker"
                role="group"
                aria-label="Habit icon"
              ></div>
              <input name="icon" type="hidden" value="star" />
            </div>
            <div class="field">
              Color
              <div class="color-picker" role="group" aria-label="Habit color">
                <button
                  class="color-swatch"
                  type="button"
                  aria-label="Pink"
                  data-color="#ff74ba"
                  style="--swatch: #ff74ba"
                ></button>
                <button
                  class="color-swatch"

                ></button>
                <button
                  class="color-swatch"
                  type="button"
                  aria-label="Green"
                  data-color="#46d29c"
                  style="--swatch: #46d29c"
                ></button>
                <button
                  class="color-swatch"
                  type="button"
                  aria-label="Teal"
                  data-color="#46d7c5"
                  style="--swatch: #46d7c5"
                ></button>
                <button
                  class="color-swatch"
                  type="button"
                  aria-label="Blue"
                  data-color="#5a8cff"
                  style="--swatch: #5a8cff"
                ></button>
                <button
                  class="color-swatch"
                  type="button"
                  aria-label="Purple"
                  data-color="#9d70ff"
                  style="--swatch: #9d70ff"

              Fill type
              <div
                class="choice-row mode-picker"
                role="group"
                aria-label="Habit fill type"

                <button
                  class="choice-pill active"
                  type="button"
                  data-mode="single"
                >
                  Single
                </button>
                <button class="choice-pill" type="button" data-mode="split">
                  Split
                </button>

              <input name="mode" type="hidden" value="single" />

          </form>
        </section>
      </div>
    </main>

    <script>
      const HABIT_STORAGE_KEY = "routineDashboard.habits.v1";
      const habitList = document.querySelector(".habit-list");
      const modal = document.querySelector("#habitModal");
      const habitForm = modal.querySelector(".habit-form");
      const weekDays = ["S", "M", "T", "W", "T", "F", "S"];
      const allowedColors = [
        "#ff74ba",
        "#ffd33d",
        "#46d29c",
        "#46d7c5",
        "#5a8cff",
        "#9d70ff",
      ];
      let editingHabitId = null;
      const DELETED_HABITS_KEY = "routineDashboard.deletedHabits.v1";
      const ICON_RECENTS_KEY = "routineDashboard.iconRecents.v1";
      const ICON_PAGE_SIZE = 18;
      const MAX_ICON_PAGES = 5;
      const legacyIconMap = {
        calendar: "solid:calendar-days",
        briefcase: "solid:briefcase",
        health: "solid:heart-pulse",
        star: "solid:star",
        book: "solid:book",
        home: "solid:house",
        flag: "solid:flag",
        heart: "solid:heart",
        dumbbell: "solid:dumbbell",
        running: "solid:person-running",
        apple: "solid:apple-whole",
        utensils: "solid:utensils",
        chart: "solid:chart-line",
        trophy: "solid:trophy",
        flame: "solid:fire",
        water: "solid:droplet",
      };
      const iconCategories = [
        { id: "recents", label: "Recents", icon: "clock-rotate-left" },
        { id: "tasks", label: "Tasks", icon: "list-check" },
        { id: "fitness", label: "Fitness", icon: "person-running" },
        { id: "other", label: "Other", icon: "shapes" },
      ];
      const fixedIconGroups = {
        tasks: [
          "calendar-days",
          "calendar-check",
          "clock",
          "hourglass-half",
          "list",
          "list-check",
          "check",
          "circle-check",
          "square-check",
          "clipboard",
          "clipboard-check",
          "file-lines",
          "folder",
          "inbox",
          "briefcase",
          "envelope",
          "bell",
          "bookmark",
          "tag",
          "flag",
          "pen",
          "pencil",
          "paperclip",
          "link",
          "lock",
          "key",
          "gear",
          "wrench",
          "screwdriver-wrench",
          "hammer",
          "trash",
          "box-archive",
          "download",
          "upload",
          "print",
          "table",
          "bars",
          "ellipsis",
          "filter",
          "sort",
          "magnifying-glass",
          "plus",
          "minus",
          "xmark",
          "rotate-right",
          "calculator",
          "receipt",
          "wallet",
          "credit-card",
          "chart-line",
          "chart-simple",
          "bullseye",
          "star",
          "circle-plus",
        ],
        fitness: [
          "person-running",
          "person-walking",
          "person-hiking",
          "shoe-prints",
          "dumbbell",
          "bicycle",
          "stopwatch",
          "heart-pulse",
          "medal",
          "trophy",
          "fire",
          "route",
          "location-dot",
          "droplet",
          "bottle-water",
          "moon",
          "sun",
          "heart",
          "leaf",
          "seedling",
          "stethoscope",
          "kit-medical",
          "pills",
          "bandage",
          "bone",
          "tooth",
          "wheelchair",
          "hospital",
          "syringe",
          "brain",
          "lungs",
          "scale-balanced",
          "user-doctor",
          "notes-medical",
          "hand-holding-medical",
          "person",
        ],
        other: [
          "utensils",
          "bowl-food",
          "apple-whole",
          "carrot",
          "pizza-slice",
          "burger",
          "hotdog",
          "ice-cream",
          "cookie",
          "mug-hot",
          "martini-glass",
          "wine-glass",
          "beer-mug-empty",
          "bread-slice",
          "cheese",
          "egg",
          "bacon",
          "lemon",
          "house",
          "bed",
          "broom",
          "shirt",
          "bath",
          "couch",
          "tv",
          "car",
          "plane",
          "map-location-dot",
          "camera",
          "music",
          "video",
          "gamepad",
          "palette",
          "book",
          "graduation-cap",
          "user",
          "users",
          "child",
          "face-smile",
          "gift",
          "lightbulb",
          "cloud",
          "umbrella",
          "tree",
          "paw",
          "globe",
          "wifi",
          "phone",
          "message",
          "shield-halved",
          "bolt",
          "gem",
          "crown",
          "rocket",
        ],
      };
      let fontAwesomeIcons = buildFixedIconLibrary();
      let activeIconCategory = "recents";
      let activeIconPage = 0;

      const defaultHabits = {};
      const sampleHabitIds = new Set([
        "breakfast",
        "lunch",
        "dinner",
        "cleaning",
        "weight",
        "running",
      ]);

      const field = (name) => habitForm.querySelector(`[name="${name}"]`);

      function iconLabel(name) {
        return name
          .split("-")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function normalizeIconValue(icon) {
        const value = String(icon || "").trim();
        if (!value || value.includes("mountain")) return "solid:star";
        if (legacyIconMap[value]) return legacyIconMap[value];
        if (value.includes(":")) return value;
        return `solid:${value}`;
      }

      function parseIconValue(icon) {
        const normalized = normalizeIconValue(icon);
        const [style, ...nameParts] = normalized.split(":");
        return {
          name: nameParts.join(":") || "star",
          style: ["solid", "regular", "brands"].includes(style)
            ? style
            : "solid",
        };
      }

      function faClass(icon) {
        const { name, style } = parseIconValue(icon);
        return `fa-${style} fa-${name}`;
      }

      function categoryMarkup(category) {
        return `<i class="fa-solid fa-${category.icon}" aria-hidden="true"></i>`;
      }

      function iconMatchesCategory(item, categoryId) {
        return item.category === categoryId;
      }

      function categoryForIcon(name) {
        return (
          Object.entries(fixedIconGroups).find(([, names]) =>
            names.includes(name),
          )?.[0] || "other"
        );
      }

      function buildFixedIconLibrary() {
        const seen = new Set();
        return Object.entries(fixedIconGroups)
          .flatMap(([category, names]) =>
            names
              .map((name) => {
                const value = `solid:${name}`;
                if (seen.has(value) || name.includes("mountain")) return null;
                seen.add(value);
                return {
                  category,
                  label: iconLabel(name),
                  name,
                  style: "solid",
                  terms: name,
                };
              })
              .filter(Boolean),
          )
          .slice(0, MAX_ICON_PAGES * ICON_PAGE_SIZE * 3);
      }

      function iconValue(item) {
        return `${item.style}:${item.name}`;
      }

      function loadRecentIcons() {
        try {
          const parsed = JSON.parse(
            localStorage.getItem(ICON_RECENTS_KEY) || "[]",
          );
          return Array.isArray(parsed)
            ? parsed
                .map(normalizeIconValue)
                .filter((icon) => !icon.includes("mountain"))
                .slice(0, 12)
            : [];
        } catch {
          return [];
        }
      }

      function saveRecentIcons(icons) {
        localStorage.setItem(
          ICON_RECENTS_KEY,
          JSON.stringify(icons.slice(0, 12)),
        );
      }

      function rememberIcon(icon) {
        const selected = normalizeIconValue(icon);
        saveRecentIcons([
          selected,
          ...loadRecentIcons().filter((item) => item !== selected),
        ]);
      }

      function iconFromValue(value) {
        const { name, style } = parseIconValue(value);
        return (
          fontAwesomeIcons.find(
            (item) => item.name === name && item.style === style,
          ) || {
            category: categoryForIcon(name),
            label: iconLabel(name),
            name,
            style,
            terms: name,
          }
        );
      }

      function randomColor() {
        return allowedColors[Math.floor(Math.random() * allowedColors.length)];
      }

      function randomIconValue() {
        const pool = fontAwesomeIcons.length
          ? fontAwesomeIcons
          : buildFixedIconLibrary();
        return iconValue(
          pool[Math.floor(Math.random() * pool.length)] || {
            style: "solid",
            name: "star",
          },
        );
      }

      function renderIconPicker(categoryId = activeIconCategory) {
        activeIconCategory = categoryId;
        if (activeIconCategory === "recents") activeIconPage = 0;
        const selected = normalizeIconValue(field("icon").value);
        const recentIcons = loadRecentIcons();
        const recentFill = fontAwesomeIcons.filter(
          (item) => !recentIcons.includes(iconValue(item)),
        );
        const categoryIcons =
          activeIconCategory === "recents"
            ? [...recentIcons.map(iconFromValue), ...recentFill].slice(0, 12)
            : fontAwesomeIcons.filter((item) =>
                iconMatchesCategory(item, activeIconCategory),
              );
        const limitedIcons = categoryIcons.slice(
          0,
          MAX_ICON_PAGES * ICON_PAGE_SIZE,
        );
        const pageSize = activeIconCategory === "recents" ? 12 : ICON_PAGE_SIZE;
        const pageCount = Math.max(
          1,
          Math.ceil(limitedIcons.length / pageSize),
        );
        activeIconPage = Math.min(activeIconPage, pageCount - 1);
        const visibleIcons = limitedIcons.slice(
          activeIconPage * pageSize,
          activeIconPage * pageSize + pageSize,
        );
        habitForm.querySelector(".icon-picker").innerHTML = `
        <div class="icon-category-row" role="tablist" aria-label="Icon categories">
          ${iconCategories
            .map(
              (category) => `
            <button class="icon-category ${category.id === activeIconCategory ? "active" : ""}" type="button" data-icon-category="${category.id}">
              ${categoryMarkup(category)}
              <span>${category.label}</span>
            </button>
          `,
            )
            .join("")}
        </div>
        <div class="icon-grid" role="group" aria-label="Habit icon choices">
          ${
            visibleIcons.length
              ? visibleIcons
                  .map(
                    (item) => `
            <button class="icon-choice ${iconValue(item) === selected ? "active" : ""}" type="button" aria-label="${item.label} icon" data-icon="${iconValue(item)}">
              ${iconSvg(iconValue(item))}
            </button>
          `,
                  )
                  .join("")
              : '<span class="icon-empty">No icons here yet</span>'
          }
        </div>
        ${
          activeIconCategory !== "recents" && pageCount > 1
            ? `
          <div class="icon-pager" aria-label="Icon pages">
            <button class="icon-page-button" type="button" data-icon-page="prev" ${activeIconPage === 0 ? "disabled" : ""} aria-label="Previous icons">
              <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
            </button>
            <span class="icon-page-label">
              ${Array.from(
                { length: pageCount },
                (_, index) => `
                <button class="icon-page-number ${index === activeIconPage ? "active" : ""}" type="button" data-icon-page-number="${index}" aria-label="Icon page ${index + 1}">${index + 1}</button>
              `,
              ).join("")}
            </span>
            <button class="icon-page-button" type="button" data-icon-page="next" ${activeIconPage === pageCount - 1 ? "disabled" : ""} aria-label="Next icons">
              <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
        `
            : ""
        }
      `;
        bindIconPickerControls();
      }

      function bindIconPickerControls() {
        habitForm.querySelectorAll(".icon-category").forEach((button) => {
          button.addEventListener("click", () => {
            activeIconPage = 0;
            renderIconPicker(button.dataset.iconCategory);
          });
        });
        habitForm.querySelectorAll(".icon-choice").forEach((button) => {
          button.addEventListener("click", () =>
            selectIcon(button.dataset.icon, true),
          );
        });
        habitForm.querySelectorAll(".icon-page-button").forEach((button) => {
          button.addEventListener("click", () => {
            activeIconPage += button.dataset.iconPage === "next" ? 1 : -1;
            renderIconPicker(activeIconCategory);
          });
        });
        habitForm.querySelectorAll(".icon-page-number").forEach((button) => {
          button.addEventListener("click", () => {
            activeIconPage = Number(button.dataset.iconPageNumber) || 0;
            renderIconPicker(activeIconCategory);
          });
        });
      }

      async function loadFontAwesomeIcons() {
        fontAwesomeIcons = buildFixedIconLibrary();
        renderIconPicker(activeIconCategory);
      }

      function iconSvg(icon) {
        return `<i class="${faClass(icon)}" aria-hidden="true"></i>`;
      }

      function loadHabits() {
        try {
          const saved = JSON.parse(
            localStorage.getItem(HABIT_STORAGE_KEY) || "{}",
          );
          const deleted = loadDeletedHabits();
          const merged = saved && typeof saved === "object" ? { ...saved } : {};
          sampleHabitIds.forEach((id) => delete merged[id]);
          deleted.forEach((id) => delete merged[id]);
          Object.entries(merged).forEach(([id, habit], index) => {
            const savedIcon =
              id === "running" && habit.icon === "flag"
                ? "solid:person-running"
                : normalizeIconValue(habit.icon);
            merged[id] = {
              ...defaultHabits[id],
              ...habit,
              label: habit.label || defaultHabits[id]?.label || "Habit",
              color: allowedColors.includes((habit.color || "").toLowerCase())
                ? habit.color
                : defaultHabits[id]?.color || "#5a8cff",
              icon: savedIcon,
              mode: habit.mode === "split" ? "split" : "single",
              order: Number.isFinite(Number(habit.order))
                ? Number(habit.order)
                : index,
              completions: normalizeCompletions(habit.completions || {}),
            };
          });
          return merged;
        } catch {
          return {};
        }
      }

      function saveHabits(habits) {
        localStorage.setItem(HABIT_STORAGE_KEY, JSON.stringify(habits));
      }

      function loadDeletedHabits() {
        try {
          const parsed = JSON.parse(
            localStorage.getItem(DELETED_HABITS_KEY) || "[]",
          );
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveDeletedHabits(ids) {
        localStorage.setItem(
          DELETED_HABITS_KEY,
          JSON.stringify([...new Set(ids)]),
        );
      }

      function sortedHabits(habits) {
        return Object.entries(habits).sort(
          ([, a], [, b]) => (Number(a.order) || 0) - (Number(b.order) || 0),
        );
      }

      function normalizeColor(color) {
        const value = (color || "").trim().toLowerCase();
        return allowedColors.includes(value) ? value : "#5a8cff";
      }

      function habitKey(label) {
        return (
          label
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/(^-|-$)/g, "") || "habit"
        );
      }

      function normalizeCompletions(completions) {
        return Object.fromEntries(
          Object.entries(completions || {})
            .map(([date, value]) => {
              const level =
                value === true
                  ? 2
                  : Math.max(0, Math.min(2, Number(value) || 0));
              return [date, level];
            })
            .filter(([, level]) => level > 0),
        );
      }

      function dateKey(date) {
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${date.getFullYear()}-${month}-${day}`;
      }

      function startOfWeek(date) {
        const copy = new Date(date);
        copy.setHours(0, 0, 0, 0);
        copy.setDate(copy.getDate() - copy.getDay());
        return copy;
      }

      function monthDates(date) {
        const dates = [];
        const first = new Date(date.getFullYear(), date.getMonth(), 1);
        const last = new Date(date.getFullYear(), date.getMonth() + 1, 0);
        for (let day = 1; day <= last.getDate(); day += 1) {
          dates.push(new Date(first.getFullYear(), first.getMonth(), day));
        }
        return dates;
      }

      function dot(completions, date, withNumber = false) {
        const level =
          completions?.[dateKey(date)] === true
            ? 2
            : Number(completions?.[dateKey(date)]) || 0;
        const stateClass = level === 2 ? "done" : level === 1 ? "half" : "";
        return `
        <span class="${withNumber ? "month-dot" : ""}">
          <span class="dot ${stateClass}" aria-label="${dateKey(date)} ${level === 2 ? "completed" : level === 1 ? "half completed" : "not completed"}"></span>
          ${withNumber ? `<span>${date.getDate()}</span>` : ""}
        </span>
      `;
      }

      function actionButton(label, className, icon) {
        return `<button class="habit-action ${className}" type="button" aria-label="${label}">${icon}</button>`;
      }

      function renderHabits() {
        const habits = loadHabits();
        saveHabits(habits);
        const today = new Date();
        const weekStart = startOfWeek(today);
        const monthName = today.toLocaleDateString(undefined, {
          month: "long",
          year: "numeric",
        });
        const habitEntries = sortedHabits(habits);

        if (!habitEntries.length) {
          habitList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-inner">
              <i class="fa-solid fa-bullseye" aria-hidden="true"></i>
              <strong>No habits yet</strong>
              <span>Add a habit to track your weekly rhythm.</span>
              <svg class="empty-arrow" viewBox="0 0 120 90" aria-hidden="true">
                <path d="M18 10 C70 18 82 54 61 72" />
                <path d="M61 72 L50 55" />
                <path d="M61 72 L80 65" />
              </svg>
            </div>
          </div>
        `;
          return;
        }

        habitList.innerHTML = habitEntries
          .map(([id, habit]) => {
            const week = weekDays
              .map((day, index) => {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + index);
                return `<span class="week-cell"><span>${day}</span>${dot(habit.completions, date)}</span>`;
              })
              .join("");
            const month = monthDates(today)
              .map((date) => dot(habit.completions, date, true))
              .join("");
            return `
          <article class="habit-row" data-habit-id="${id}" style="--accent: ${habit.color || "var(--blue)"}">
            <button class="edit-habit" type="button" aria-label="Edit ${habit.label}">
              <svg class="pencil-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <svg class="minus-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h14" stroke="currentColor" stroke-linecap="round" />
              </svg>
            </button>
            <button class="habit-main" type="button" aria-label="Open ${habit.label} month view">
              <p class="habit-label">${iconSvg(habit.icon)}${habit.label}</p>
              <div class="week-grid">${week}</div>
            </button>
            <div class="habit-actions">
              ${actionButton("Move habit up", "move-up", '<svg viewBox="0 0 24 24" fill="none"><path d="m12 5-6 6M12 5l6 6M12 5v14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" /></svg>')}
              ${actionButton("Move habit down", "move-down", '<svg viewBox="0 0 24 24" fill="none"><path d="m12 19-6-6M12 19l6-6M12 19V5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" /></svg>')}
              ${actionButton("Edit habit", "edit", '<svg viewBox="0 0 24 24" fill="none"><path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" /></svg>')}
              ${actionButton("Delete habit", "delete", '<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" /></svg>')}
            </div>
            <div class="month-panel">
              <div class="month-head">
                <span>${monthName}</span>
                <button class="close-month" type="button" aria-label="Close month view">x</button>
              </div>
              <div class="month-grid">${month}</div>
            </div>
          </article>
        `;
          })
          .join("");

        habitList.querySelectorAll(".habit-main").forEach((button) => {
          button.addEventListener("click", () => {
            button.closest(".habit-row").classList.toggle("open");
          });
        });
        habitList.querySelectorAll(".close-month").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            button.closest(".habit-row").classList.remove("open");
          });
        });
        habitList.querySelectorAll(".edit-habit").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const row = button.closest(".habit-row");
            row.classList.toggle("editing");
            button.setAttribute(
              "aria-label",
              row.classList.contains("editing")
                ? `Close ${row.dataset.habitId} controls`
                : `Edit ${row.dataset.habitId}`,
            );
          });
        });
        habitList.querySelectorAll(".habit-action.edit").forEach((button) => {
          button.addEventListener("click", () =>
            openHabitModal(button.closest(".habit-row").dataset.habitId),
          );
        });
        habitList.querySelectorAll(".habit-action.delete").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.closest(".habit-row").dataset.habitId;
            const next = loadHabits();
            delete next[id];
            if (defaultHabits[id])
              saveDeletedHabits([...loadDeletedHabits(), id]);
            saveHabits(reindex(next));
            renderHabits();
          });
        });
        habitList
          .querySelectorAll(".habit-action.move-up, .habit-action.move-down")
          .forEach((button) => {
            button.addEventListener("click", () => {
              const row = button.closest(".habit-row");
              const sibling = button.classList.contains("move-up")
                ? row.previousElementSibling
                : row.nextElementSibling;
              if (!sibling) return;
              if (button.classList.contains("move-up")) {
                habitList.insertBefore(row, sibling);
              } else {
                habitList.insertBefore(sibling, row);
              }
              const habits = loadHabits();
              habitList
                .querySelectorAll(".habit-row")
                .forEach((habitRow, order) => {
                  if (habits[habitRow.dataset.habitId])
                    habits[habitRow.dataset.habitId].order = order;
                });
              saveHabits(habits);
            });
          });
      }

      function reindex(habits) {
        sortedHabits(habits).forEach(([id], index) => {
          habits[id].order = index;
        });
        return habits;
      }

      function moveHabit(id, direction) {
        const habits = loadHabits();
        const entries = sortedHabits(habits);
        const index = entries.findIndex(([entryId]) => entryId === id);
        const target = index + direction;
        if (index < 0 || target < 0 || target >= entries.length) return;
        [entries[index], entries[target]] = [entries[target], entries[index]];
        entries.forEach(([entryId], order) => {
          habits[entryId].order = order;
        });
        saveHabits(habits);
        renderHabits();
      }

      function selectIcon(icon, shouldRemember = false) {
        const selected = normalizeIconValue(icon);
        field("icon").value = selected;
        if (shouldRemember) rememberIcon(selected);
        habitForm.querySelectorAll(".icon-choice").forEach((button) => {
          button.classList.toggle("active", button.dataset.icon === selected);
        });
        if (shouldRemember && activeIconCategory === "recents")
          renderIconPicker("recents");
      }

      function selectColor(color) {
        const selected = normalizeColor(color);
        field("color").value = selected;
        habitForm.querySelectorAll(".color-swatch").forEach((button) => {
          button.classList.toggle("active", button.dataset.color === selected);
        });
      }

      function selectMode(mode) {
        const selected = mode === "split" ? "split" : "single";
        field("mode").value = selected;
        habitForm
          .querySelectorAll(".mode-picker .choice-pill")
          .forEach((button) => {
            button.classList.toggle("active", button.dataset.mode === selected);
          });
      }

      function openHabitModal(id = null) {
        const habits = loadHabits();
        const habit = id
          ? habits[id]
          : {
              label: "",
              icon: randomIconValue(),
              color: randomColor(),
              mode: "single",
            };
        if (id && !habit) return;
        editingHabitId = id;
        modal.querySelector(".modal-title").textContent = id
          ? "Edit habit"
          : "Add habit";
        field("label").value = habit.label;
        selectIcon(habit.icon);
        selectColor(habit.color);
        selectMode(habit.mode || "single");
        activeIconCategory = "recents";
        activeIconPage = 0;
        renderIconPicker("recents");
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
        field("label").focus();
      }

      function closeHabitModal() {
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        editingHabitId = null;
      }

      habitForm
        .querySelector(".icon-picker")
        .classList.add("categorized-icon-picker");
      renderIconPicker();
      loadFontAwesomeIcons();
      habitForm.querySelectorAll(".color-swatch").forEach((button) => {
        button.addEventListener("click", () =>
          selectColor(button.dataset.color),
        );
      });
      habitForm
        .querySelectorAll(".mode-picker .choice-pill")
        .forEach((button) => {
          button.addEventListener("click", () =>
            selectMode(button.dataset.mode),
          );
        });
      modal
        .querySelector(".modal-close")
        .addEventListener("click", closeHabitModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeHabitModal();
      });
      habitForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const habits = loadHabits();
        const label = field("label").value.trim() || "Habit";
        const id =
          editingHabitId ||
          (() => {
            const base = habitKey(label);
            let candidate = base;
            let index = 2;
            while (habits[candidate]) {
              candidate = `${base}-${index}`;
              index += 1;
            }
            return candidate;
          })();
        const habit = habits[id] || {
          order: sortedHabits(habits).length,
          completions: {},
        };
        habit.label = field("label").value.trim() || "Habit";
        habit.icon = field("icon").value;
        habit.color = normalizeColor(field("color").value);
        habit.mode = field("mode").value === "split" ? "split" : "single";
        habit.order = Number.isFinite(Number(habit.order))
          ? Number(habit.order)
          : sortedHabits(habits).length;
        habit.completions = normalizeCompletions(habit.completions || {});
        habits[id] = habit;
        saveDeletedHabits(
          loadDeletedHabits().filter((deletedId) => deletedId !== id),
        );
        saveHabits(habits);
        closeHabitModal();
        renderHabits();
      });

      renderHabits();
      window.addEventListener("openHabitComposer", () => openHabitModal());
      if (new URLSearchParams(window.location.search).get("add") === "habit") {
        openHabitModal();
        history.replaceState(null, "", "habits.html");
      }
    </script>
    <script src="bottom-bar.js?v=shared-nav-2"></script>
  </body>
</html>
